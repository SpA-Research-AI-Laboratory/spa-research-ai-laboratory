            nodeLabels = g.append('g').selectAll('text').data(GRAPH_DATA.nodes).enter()
                .append('text').attr('class', 'node-label')
                .attr('text-anchor', 'middle').text(d => d.label).attr('opacity', 0);

            zoomBehavior = d3.zoom().on('zoom', (event) => { g.attr('transform', event.transform); });
            svg.call(zoomBehavior);
            svg.on('click', function() { if (selectedNode !== null) deselectNode(); });

            initFilters();
            initRelationshipFilters();
            initDisplayOptions();
            initSearch();
            initControls();

            function tick() {
                linkElements.attr('d', d => {
                    const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
                    const dr = Math.sqrt(dx * dx + dy * dy) * 1.5;
                    return 'M' + d.source.x + ',' + d.source.y + 'A' + dr + ',' + dr + ' 0 0,1 ' + d.target.x + ',' + d.target.y;
                });
                nodeElements
                    .attr('cx', d => d.x = Math.max(0, Math.min(width, d.x)))
                    .attr('cy', d => d.y = Math.max(0, Math.min(height, d.y)));
                nodeLabels.attr('x', d => d.x).attr('y', d => d.y);

                // Update persistent node labels
                persistentNodeLabelGroup.selectAll('text')
                    .attr('x', d => d.x).attr('y', d => d.y + getNodeSize(d) + 12);

                // Update persistent edge labels
                persistentEdgeLabelGroup.selectAll('.p-edge-label-group')
                    .attr('transform', d => {
                        const mx = (d.source.x + d.target.x) / 2;
                        const my = (d.source.y + d.target.y) / 2;
                        return 'translate(' + mx + ',' + my + ')';
                    });
            }
        }

        function getNodeSize(node) {
            const baseSize = NODE_SIZES[node.type] || 16;
            const connectionCount = GRAPH_DATA.edges.filter(e => e.source.id === node.id || e.target.id === node.id).length;
            return baseSize + Math.sqrt(connectionCount) * 1.5;
        }

        function getEdgeWidth(edge) {
            const w = { 'high': 2.5, 'medium': 2, 'low': 1.5, 'hypothesized': 1 };
            return w[edge.confidence] || 2;
        }

        function highlightNode(node) {
            nodeElements.attr('opacity', 0.08);
            linkElements.attr('opacity', 0.08);
            nodeLabels.attr('opacity', 0);
            nodeElements.filter(d => d.id === node.id).attr('opacity', 1);

            const connectedNodeIds = new Set([node.id]);
            linkElements.filter(d => {
                const conn = d.source.id === node.id || d.target.id === node.id;
                if (conn) {
                    if (d.source.id === node.id) connectedNodeIds.add(d.target.id);
                    if (d.target.id === node.id) connectedNodeIds.add(d.source.id);
                }
                return conn;
            })
                .attr('opacity', 1.0)
                .attr('stroke-width', d => getEdgeWidth(d) + 1)
                .attr('stroke', d => EDGE_RELATIONSHIP_COLORS[d.relationship] || '#5a6370');

            nodeElements.filter(d => connectedNodeIds.has(d.id)).attr('opacity', 1);
            nodeLabels.filter(d => connectedNodeIds.has(d.id)).attr('opacity', 1);
        }

        function showEdgeLabels(node) {
            clearEdgeLabels();
            const connectedEdges = GRAPH_DATA.edges.filter(d => d.source.id === node.id || d.target.id === node.id);
            connectedEdges.forEach(edge => {
                const source = edge.source, target = edge.target;
                const midX = (source.x + target.x) / 2, midY = (source.y + target.y) / 2;
                const labelGroup = edgeLabelGroup.append('g').attr('class', 'edge-label-item')
                    .attr('transform', 'translate(' + midX + ',' + midY + ')');
                const text = labelGroup.append('text').attr('class', 'edge-label-text').text(edge.relationship);
                const bbox = text.node().getBBox();
                labelGroup.insert('rect', ':first-child').attr('class', 'edge-label-bg')
                    .attr('x', bbox.x - 4).attr('y', bbox.y - 2)
                    .attr('width', bbox.width + 8).attr('height', bbox.height + 4);
            });
        }

        function clearEdgeLabels() { edgeLabelGroup.selectAll('.edge-label-item').remove(); }
        function clearHighlight() {
            nodeElements.attr('opacity', 1);
            linkElements.attr('opacity', 0.6).attr('stroke-width', d => getEdgeWidth(d));
            nodeLabels.attr('opacity', 0);
        }

        function selectNode(node) {
            selectedNode = node;
            hoveredNode = node;
            highlightNode(node);
            showDetailPanel(node);
        }

        function deselectNode() {
            selectedNode = null;
            hoveredNode = null;
            clearHighlight();
            closeDetailPanel();
        }

        function showDetailPanel(node) {
            const panel = document.getElementById('detail-panel');
            const content = document.getElementById('detail-content');
            let html = '<div class="detail-label">' + node.label + '</div><span class="detail-type">' + node.type + '</span>';
            if (node.description) html += '<div class="detail-description">' + node.description + '</div>';
            if (node.wikipedia) html += '<a href="' + node.wikipedia + '" target="_blank" class="detail-wikipedia">Wikipedia ↗</a>';
            if (node.type === 'Disease' && node.icd10) {
                html += '<div class="detail-section"><div class="detail-section-title">Clinical Info</div>' +
                    '<div class="detail-property"><span class="detail-property-label">ICD-10:</span>' +
                    '<span class="detail-property-value">' + node.icd10 + '</span></div>' +
                    '<div class="detail-property"><span class="detail-property-label">Prevalence:</span>' +
                    '<span class="detail-property-value">' + (node.prevalence || 'N/A') + '</span></div></div>';
            }

            const outgoing = GRAPH_DATA.edges.filter(e => e.source.id === node.id);
            const incoming = GRAPH_DATA.edges.filter(e => e.target.id === node.id);
            const connections = {};
            outgoing.forEach(e => {
                if (!connections[e.relationship]) connections[e.relationship] = [];
                const targetNode = GRAPH_DATA.nodes.find(n => n.id === e.target.id);
                connections[e.relationship].push({label: targetNode.label, id: e.target.id});
            });
            incoming.forEach(e => {
                if (!connections[e.relationship]) connections[e.relationship] = [];
                const sourceNode = GRAPH_DATA.nodes.find(n => n.id === e.source.id);
                connections[e.relationship].push({label: sourceNode.label, id: e.source.id});
            });

            if (Object.keys(connections).length > 0) {
                html += '<div class="detail-section"><div class="detail-section-title">Connections</div>';
                Object.entries(connections).forEach(([rel, items]) => {
                    html += '<div class="connection-group"><div class="connection-type">' + rel + '</div>';
                    items.forEach(item => {
                        html += '<div class="connection-item" onclick="clickConnection(\''+item.id+'\')">'+item.label+'</div>';
                    });
                    html += '</div>';
                });
                html += '</div>';
            }

            if (node.references && node.references.length > 0) {
                html += '<div class="detail-section"><div class="detail-section-title">References</div>';
                node.references.forEach(ref => {
                    html += '<div style="font-size:11px; margin-bottom:4px;"><a href="https://pubmed.ncbi.nlm.nih.gov/'+ref+'" target="_blank" style="color:#58a6ff;">PubMed: '+ref+'</a></div>';
                });
                html += '</div>';
            }

            content.innerHTML = html;
            panel.classList.add('active');
        }

        function closeDetailPanel() { document.getElementById('detail-panel').classList.remove('active'); }

        function initFilters() {
            const typeContainer = document.getElementById('type-filters');
            const confidenceContainer = document.getElementById('confidence-filters');
            const types = [], typeSet = new Set();
            GRAPH_DATA.nodes.forEach(n => {
                if (!typeSet.has(n.type)) { typeSet.add(n.type); types.push(n.type); }
            });
            types.sort();

            types.forEach(type => {
                const color = NODE_COLORS[type] || '#8b949e';
                const label = document.createElement('label');
                label.className = 'filter-label';
                label.innerHTML = '<input type="checkbox" class="filter-checkbox" data-type="'+type+'" checked>' +
                    '<span class="color-dot" style="background-color:'+color+'"></span><span>'+type+'</span>';
                label.querySelector('input').addEventListener('change', updateFilters);
                typeContainer.appendChild(label);
            });

            ['high', 'medium', 'low', 'hypothesized'].forEach(level => {
                const label = document.createElement('label');
                label.className = 'filter-label';
                label.innerHTML = '<input type="checkbox" class="filter-checkbox" data-confidence="'+level+'" checked>' +
                    '<span>'+(level.charAt(0).toUpperCase() + level.slice(1))+'</span>';
                label.querySelector('input').addEventListener('change', updateFilters);
                confidenceContainer.appendChild(label);
            });

            const legendContainer = document.getElementById('legend');
            types.forEach(type => {
                const color = NODE_COLORS[type] || '#8b949e';
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = '<span class="legend-color" style="background-color:'+color+'"></span><span>'+type+'</span>';
                legendContainer.appendChild(item);
            });
        }

        function updateFilters() {
            activeFilters.types.clear();
            activeFilters.confidence.clear();
            if (!activeFilters.relationships) activeFilters.relationships = new Set();
            activeFilters.relationships.clear();
            document.querySelectorAll('[data-type]:checked').forEach(cb => activeFilters.types.add(cb.dataset.type));
            document.querySelectorAll('[data-confidence]:checked').forEach(cb => activeFilters.confidence.add(cb.dataset.confidence));
            document.querySelectorAll('[data-relationship]:checked').forEach(cb => activeFilters.relationships.add(cb.dataset.relationship));

            nodeElements.style('opacity', d => !activeFilters.types.has(d.type) ? 0 : 1);
            nodeElements.style('pointer-events', d => !activeFilters.types.has(d.type) ? 'none' : 'all');
            nodeLabels.style('opacity', d => !activeFilters.types.has(d.type) ? 0 : null);

            linkElements.style('opacity', d => {
                const src = GRAPH_DATA.nodes.find(n => n.id === d.source.id);
                const tgt = GRAPH_DATA.nodes.find(n => n.id === d.target.id);
                const visible = activeFilters.types.has(src.type) && activeFilters.types.has(tgt.type) 
                    && activeFilters.confidence.has(d.confidence) 
                    && activeFilters.relationships.has(d.relationship);
                return visible ? 0.6 : 0;
            });
            linkElements.style('pointer-events', d => {
                const src = GRAPH_DATA.nodes.find(n => n.id === d.source.id);
                const tgt = GRAPH_DATA.nodes.find(n => n.id === d.target.id);
                const visible = activeFilters.types.has(src.type) && activeFilters.types.has(tgt.type) 
                    && activeFilters.confidence.has(d.confidence) 
                    && activeFilters.relationships.has(d.relationship);
                return visible ? 'all' : 'none';
            });

            // Update persistent labels visibility based on filters
            persistentNodeLabelGroup.selectAll('text')
                .style('display', d => activeFilters.types.has(d.type) ? null : 'none');
            persistentEdgeLabelGroup.selectAll('.p-edge-label-group')
                .style('display', d => {
                    const src = GRAPH_DATA.nodes.find(n => n.id === d.source.id);
                    const tgt = GRAPH_DATA.nodes.find(n => n.id === d.target.id);
                    return (activeFilters.types.has(src.type) && activeFilters.types.has(tgt.type) 
                        && activeFilters.confidence.has(d.confidence)
                        && activeFilters.relationships.has(d.relationship)) ? null : 'none';
                });
        }

        function initSearch() {
            const searchBox = document.getElementById('search-box');
            const dropdown = document.getElementById('search-dropdown');
            searchBox.addEventListener('input', function() {
                const query = this.value.toLowerCase();
                dropdown.innerHTML = '';
                if (query.length > 0) {
                    const results = GRAPH_DATA.nodes.filter(n => n.label.toLowerCase().includes(query) || (n.id && n.id.toLowerCase().includes(query))).slice(0, 10);
                    results.forEach(node => {
                        const item = document.createElement('div');
                        item.className = 'search-item';
                        item.innerHTML = node.label + '<span class="search-item-type">'+node.type+'</span>';
                        item.addEventListener('click', () => {
                            selectNode(node);
                            searchBox.value = '';
                            dropdown.classList.remove('active');
                        });
                        dropdown.appendChild(item);
                    });
                    dropdown.classList.add('active');
                } else {
                    dropdown.classList.remove('active');
                }
            });
            document.addEventListener('click', function(e) { if (e.target !== searchBox) dropdown.classList.remove('active'); });
        }

        function initControls() {
            document.getElementById('reset-btn').addEventListener('click', () => {
                simulation.alpha(1).restart();
                svg.transition().duration(750).call(zoomBehavior.transform, d3.zoomIdentity.translate(0, 0));
            });
            document.getElementById('zoom-in-btn').addEventListener('click', () => {
                svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.3);
            });
            document.getElementById('zoom-out-btn').addEventListener('click', () => {
                svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.77);
            });
            document.getElementById('center-btn').addEventListener('click', () => {
                const w = svg.node().clientWidth, h = svg.node().clientHeight;
                svg.transition().duration(750).call(zoomBehavior.transform, d3.zoomIdentity.translate(w / 2, h / 2));
            });
            document.getElementById('detail-close').addEventListener('click', function(e) { e.stopPropagation(); deselectNode(); });
        }

        function initDisplayOptions() {
            const nodeToggle = document.getElementById('toggle-node-labels');
            const edgeToggle = document.getElementById('toggle-edge-labels');
            const fontInput = document.getElementById('font-size-input');

            nodeToggle.addEventListener('change', function() {
                persistentNodeLabelGroup.style('display', this.checked ? null : 'none');
            });

            edgeToggle.addEventListener('change', function() {
                if (this.checked) {
                    // Build persistent edge labels
                    persistentEdgeLabelGroup.selectAll('.p-edge-label-group').remove();
                    const groups = persistentEdgeLabelGroup.selectAll('.p-edge-label-group')
                        .data(GRAPH_DATA.edges).enter()
                        .append('g').attr('class', 'p-edge-label-group');
                    groups.each(function(d) {
                        const g = d3.select(this);
                        const text = g.append('text').attr('class', 'persistent-edge-label')
                            .text(d.relationship)
                            .style('font-size', fontInput.value + 'px');
                        const bbox = text.node().getBBox();
                        g.insert('rect', ':first-child').attr('class', 'persistent-edge-label-bg')
                            .attr('x', bbox.x - 3).attr('y', bbox.y - 1)
                            .attr('width', bbox.width + 6).attr('height', bbox.height + 2);
                    });
                    persistentEdgeLabelGroup.style('display', null);
                } else {
                    persistentEdgeLabelGroup.style('display', 'none');
                }
            });

            fontInput.addEventListener('input', function() {
                const size = this.value + 'px';
                persistentNodeLabelGroup.selectAll('text').style('font-size', size);
                // Rebuild edge labels if visible
                if (edgeToggle.checked) {
                    persistentEdgeLabelGroup.selectAll('.p-edge-label-group').remove();
                    const groups = persistentEdgeLabelGroup.selectAll('.p-edge-label-group')
                        .data(GRAPH_DATA.edges).enter()
                        .append('g').attr('class', 'p-edge-label-group');
                    groups.each(function(d) {
                        const g = d3.select(this);
                        const text = g.append('text').attr('class', 'persistent-edge-label')
                            .text(d.relationship).style('font-size', size);
                        const bbox = text.node().getBBox();
                        g.insert('rect', ':first-child').attr('class', 'persistent-edge-label-bg')
                            .attr('x', bbox.x - 3).attr('y', bbox.y - 1)
                            .attr('width', bbox.width + 6).attr('height', bbox.height + 2);
                    });
                }
            });
        }

        function initRelationshipFilters() {
            const container = document.getElementById('relationship-filters');
            const relTypes = new Set();
            GRAPH_DATA.edges.forEach(e => relTypes.add(e.relationship));
            const sorted = Array.from(relTypes).sort();
            activeFilters.relationships = new Set(sorted);

            sorted.forEach(rel => {
                const color = EDGE_RELATIONSHIP_COLORS[rel] || '#5a6370';
                const count = GRAPH_DATA.edges.filter(e => e.relationship === rel).length;
                const label = document.createElement('label');
                label.className = 'filter-label rel-filter-item';
                label.innerHTML = '<input type="checkbox" class="filter-checkbox" data-relationship="'+rel+'" checked>' +
                    '<span class="rel-color-line" style="background-color:'+color+'"></span>' +
                    '<span style="flex:1">' + rel.replace(/_/g, ' ') + '</span>' +
                    '<span style="color:#6e7681; font-size:10px;">' + count + '</span>';
                label.querySelector('input').addEventListener('change', updateFilters);
                container.appendChild(label);
            });
        }

        function dragstart(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
        function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
        function dragend(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

        function clickConnection(nodeId) {
            const node = GRAPH_DATA.nodes.find(n => n.id === nodeId);
            if (node) selectNode(node);
        }

        window.addEventListener('load', initVisualization);
    </script>
</body>
</html>
