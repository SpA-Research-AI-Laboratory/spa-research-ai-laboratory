            height: 3px;

    <script>
        const GRAPH_DATA = {"metadata": {"version": "1.0", "created": "2026-03-05", "nodeCount": 119, "edgeCount": 172, "description": "Comprehensive Spondyloarthritis Knowledge Graph - Seed Dataset"}, "nodes": [{"id": "disease-ankylosing-spondylitis", "label": "Ankylosing Spondylitis", "type": "Disease", "description": "Ankylosing Spondylitis (AS) is a chronic inflammatory arthropathy primarily affecting the sacroiliac joints and spine, characterized by progressive spinal fusion and ankylosis (bony bridging). It is the most common form of spondyloarthritis and predominantly affects males (3-4 times more common). AS is strongly associated with HLA-B27 positivity (88-90% of patients) and leads to significant disability if untreated, with potential for complete spinal immobility.", "icd10": "M45.9", "prevalence": "0.1-0.2% in European populations", "source": ["ICD-10", "EULAR", "ACR"], "confidence": "high", "references": ["22553110", "25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Ankylosing_spondylitis"}, {"id": "disease-psoriatic-arthritis", "label": "Psoriatic Arthritis", "type": "Disease", "description": "Psoriatic Arthritis (PsA) is an inflammatory arthritis that develops in 6-42% of patients with cutaneous psoriasis, distinct from but related to the spondyloarthritis family. It can present as axial (spine-predominant) or peripheral (asymmetric polyarthritis) disease, with skin manifestations often preceding joint symptoms. PsA shares genetic features with AS including HLA-B27 positivity in axial presentations and demonstrates T-cell driven immune dysregulation.", "icd10": "L40.5", "prevalence": "0.05-0.25% in general population", "source": ["ICD-10", "EULAR"], "confidence": "high", "references": ["23676134", "29145608"], "wikipedia": "https://en.wikipedia.org/wiki/Psoriatic_arthritis"}, {"id": "disease-reactive-arthritis", "label": "Reactive Arthritis", "type": "Disease", "description": "Reactive Arthritis (formerly Reiter's syndrome) is a sterile inflammatory arthritis triggered by preceding bacterial infection of the gastrointestinal or urogenital tract. This post-infectious condition typically develops 1-4 weeks after infection with organisms like Chlamydia, Shigella, or Salmonella. It represents a form of spondyloarthritis with HLA-B27 associations and can progress to chronic arthritic disease if untreated.", "icd10": "M02.9", "prevalence": "0.01-0.05% annual incidence", "source": ["ICD-10", "ACR"], "confidence": "high", "references": ["19654303", "25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Reactive_arthritis"}, {"id": "disease-axial-spa-nr", "label": "Non-Radiographic Axial SpA", "type": "Disease", "description": "Non-Radiographic Axial Spondyloarthritis (nr-axial SpA) is early axial SpA without radiographic changes on plain radiographs but with inflammatory changes visible on MRI. This condition typically precedes radiographic AS and affects 7-15% of axial SpA patients, representing the earliest detectable form of axial disease. Early intervention with biologic therapy in nr-axial SpA shows promise for preventing progression to radiographic AS and maintaining spinal function.", "icd10": "M45.8", "prevalence": "0.1-0.3% in general population", "source": ["EULAR", "ASspirations"], "confidence": "high", "references": ["21873635", "25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Axial_spondyloarthritis"}, {"id": "disease-enteropathic-arthritis", "label": "Enteropathic Arthritis", "type": "Disease", "description": "Enteropathic Arthritis is a form of spondyloarthritis associated with inflammatory bowel diseases including Crohn's disease and ulcerative colitis, occurring in 15-30% of IBD patients. The arthritis can be either peripheral or axial, and typically improves with treatment of the underlying bowel inflammation. This connection highlights the shared mucosal immune dysregulation and bacterial-driven pathogenesis in both intestinal and articular manifestations.", "icd10": "M07.6", "prevalence": "10-30% in IBD patients", "source": ["ICD-10", "EULAR"], "confidence": "high", "references": ["27660185", "22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Inflammatory_bowel_disease"}, {"id": "disease-undifferentiated-spa", "label": "Undifferentiated SpA", "type": "Disease", "description": "Undifferentiated SpA (uSpA) refers to spondyloarthritis that does not meet classification criteria for AS, PsA, or other defined subtypes despite having characteristic SpA features. This heterogeneous group includes patients with inflammatory back pain, HLA-B27 positivity, and elevated inflammatory markers but incomplete phenotypic presentation. Many uSpA patients eventually develop into a specific SpA subtype over time, while others remain undifferentiated for years.", "icd10": "M45.9", "prevalence": "Variable", "source": ["EULAR"], "confidence": "medium", "references": ["21873635"], "wikipedia": "https://en.wikipedia.org/wiki/Spondyloarthritis"}, {"id": "disease-juvenile-spa", "label": "Juvenile SpA", "type": "Disease", "description": "Juvenile Spondyloarthritis (jSpA) is spondyloarthritis with onset before age 16 years, often presenting with peripheral arthritis and HLA-B27 positivity. Early-onset disease can follow a more aggressive course with greater functional impairment if untreated, though biologic therapies have significantly improved outcomes in children. jSpA may evolve from peripheral to axial patterns as children mature.", "icd10": "M45.9", "prevalence": "0.01-0.05% in children", "source": ["EULAR"], "confidence": "medium", "references": ["27195436"], "wikipedia": "https://en.wikipedia.org/wiki/Juvenile_arthritis"}, {"id": "cell-th17", "label": "Th17 Cell", "type": "Immune Cell", "description": "Th17 cells are CD4+ helper T cell subset that produce IL-17, IL-22, and other inflammatory cytokines, and are central to SpA pathogenesis. These cells differentiate from naive CD4+ T cells in response to IL-23 and IL-6/TGF-beta signaling, and accumulate at sites of SpA inflammation including synovium and entheses. Th17 cells directly drive osteoclastogenesis and bone destruction through RANKL and IL-17 production.", "lineage": "Adaptive", "markers": ["CD4+", "IL-17A+", "IL-17F+", "ROR\u03b3t+"], "location": ["synovium", "gut", "blood"], "source": ["CellMarker", "ImmGen"], "confidence": "high", "references": ["22553110", "23676134"], "wikipedia": "https://en.wikipedia.org/wiki/T_helper_17_cell"}, {"id": "cell-th1", "label": "Th1 Cell", "type": "Immune Cell", "description": "Th1 cells are CD4+ helper T cell subset producing IFN-gamma and TNF-alpha, driving classical cell-mediated immune responses. Th1 cells are elevated in SpA and contribute to macrophage activation and chronic inflammation at articular and extra-articular sites. The balance between Th1 and Th17 responses differs across SpA subtypes and influences treatment response.", "lineage": "Adaptive", "markers": ["CD4+", "IFN-\u03b3+", "T-bet+"], "location": ["synovium", "blood"], "source": ["CellMarker"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/T_helper_1_cell"}, {"id": "cell-cd8-t", "label": "CD8+ T Cell", "type": "Immune Cell", "description": "CD8+ cytotoxic T lymphocytes are key components of SpA pathogenesis through recognition of HLA-B27-restricted peptide epitopes from self and microbial sources. CD8+ T cells produce IFN-gamma and TNF-alpha, contributing to chronic joint and entheseal inflammation in SpA. Cross-reactive CD8+ T cells against both HLA-B27 and bacterial epitopes may perpetuate SpA through molecular mimicry.", "lineage": "Adaptive", "markers": ["CD8+", "CD3+"], "location": ["synovium", "blood", "gut"], "source": ["CellMarker"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Cytotoxic_T_cell"}, {"id": "cell-gamma-delta-t", "label": "\u03b3\u03b4 T Cell", "type": "Immune Cell", "description": "Gamma-delta (\u03b3\u03b4) T cells are unconventional T cells with gamma-delta receptors that produce large amounts of IL-17, and are enriched at mucosal sites and entheses. \u03b3\u03b4 T cells expand in response to IL-23 and recognize both microbial antigens and phosphoantigens, contributing to SpA pathogenesis. \u03b3\u03b4 T cells may be particularly important in barrier tolerance at mucosal surfaces.", "lineage": "Adaptive", "markers": ["TCR\u03b3\u03b4+", "IL-17A+"], "location": ["gut", "skin", "synovium"], "source": ["CellMarker"], "confidence": "high", "references": ["23676134", "25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Gamma_delta_T_cell"}, {"id": "cell-mait", "label": "MAIT Cell", "type": "Immune Cell", "description": "Mucosal-associated invariant T (MAIT) cells are innate-like T cells with invariant TCR-alpha chains that recognize bacterial metabolites (vitamin B derivatives) presented on MR1. MAIT cells produce IL-17, IFN-gamma, and TNF-alpha and are linked to bacterial sensing and barrier immunity in SpA. MAIT cell dysregulation and enrichment at inflamed sites implicates bacterial-driven immune responses in SpA pathogenesis.", "lineage": "Adaptive", "markers": ["V\u03b17.2+", "CD161+", "IL-17A+"], "location": ["gut", "blood"], "source": ["CellMarker"], "confidence": "medium", "references": ["23676134"], "wikipedia": "https://en.wikipedia.org/wiki/MAIT_cell"}, {"id": "cell-treg", "label": "Regulatory T Cell (Treg)", "type": "Immune Cell", "description": "Regulatory T cells (Tregs) are CD4+CD25+Foxp3+ suppressive T cells that produce IL-10 and TGF-beta and maintain immune tolerance to self-antigens and commensals. Tregs are often reduced in number and impaired in function in SpA, contributing to inadequate immune suppression of pathogenic Th17 and TNF-producing responses. Expansion and restoration of Treg function is an emerging therapeutic strategy in SpA.", "lineage": "Adaptive", "markers": ["CD4+", "CD25+", "Foxp3+"], "location": ["blood", "synovium", "gut"], "source": ["CellMarker"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Regulatory_T_cell"}, {"id": "cell-ilc3", "label": "ILC3 (Innate Lymphoid Cell Type 3)", "type": "Immune Cell", "description": "Innate Lymphoid Cell type 3 (ILC3) are innate immune cells producing IL-17 and IL-22, crucial for maintaining gut barrier function and responding to mucosal pathogens. ILC3 frequencies and IL-17 production are elevated in SpA, contributing to both barrier dysfunction and systemic immune activation. ILC3-derived IL-17 and IL-22 may be important in the pathogenic link between intestinal dysbiosis and SpA.", "lineage": "Innate", "markers": ["ROR\u03b3t+", "IL-17A+", "IL-22+"], "location": ["gut", "lymphoid tissue"], "source": ["CellMarker"], "confidence": "high", "references": ["25180821", "27195436"], "wikipedia": "https://en.wikipedia.org/wiki/Innate_lymphoid_cell"}, {"id": "cell-neutrophil", "label": "Neutrophil", "type": "Immune Cell", "description": "Neutrophils are the most abundant innate immune cells that are rapidly recruited to SpA-inflamed joints and entheses by IL-8 and TNF-alpha-induced chemokines. These short-lived cells produce reactive oxygen species, serine proteases, and form neutrophil extracellular traps (NETs) that amplify local inflammation and tissue damage. Elevated neutrophil counts and high serum IL-8 correlate with active SpA disease, making neutrophil recruitment an important amplification loop in SpA pathogenesis.", "lineage": "Innate", "markers": ["CD15+", "CD11b+"], "location": ["synovium", "blood"], "source": ["CellMarker"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Neutrophil"}, {"id": "cell-macrophage", "label": "Macrophage", "type": "Immune Cell", "description": "Macrophages are myeloid cells derived from circulating monocytes that infiltrate inflamed joints and entheses in SpA, producing TNF-alpha, IL-1-beta, IL-6, and IL-23. These professional antigen-presenting cells are activated by microbial pattern recognition receptors and pro-inflammatory signals, perpetuating local and systemic inflammation. Macrophage accumulation in SpA tissues correlates with disease activity and is a target of TNF inhibitors.", "lineage": "Innate", "markers": ["CD14+", "CD68+"], "location": ["synovium", "enthesis", "gut"], "source": ["CellMarker"], "confidence": "high", "references": ["22553110", "25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Macrophage"}, {"id": "cell-dendritic", "label": "Dendritic Cell", "type": "Immune Cell", "description": "Dendritic cells are professional antigen-presenting cells that bridge innate and adaptive immunity by capturing and processing antigens to naive T cells. In SpA, dendritic cells are activated by TNF-alpha and microbial antigens, producing IL-23 and IL-12 that drive Th17 and Th1 differentiation respectively. Dysregulation of dendritic cell responses to commensal bacteria and microbial antigens contributes to SpA pathogenesis.", "lineage": "Innate", "markers": ["CD11c+", "HLA-DR+"], "location": ["synovium", "gut", "lymphoid tissue"], "source": ["CellMarker"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Dendritic_cell"}, {"id": "cell-mast", "label": "Mast Cell", "type": "Immune Cell", "description": "Mast cells are innate immune cells residing in tissues that release pre-formed mediators and produce TNF-alpha, IL-6, and other inflammatory cytokines upon activation. Increased mast cell numbers have been found in SpA synovium and may contribute to local inflammation and pain through substance P and other neuropeptide signaling. Mast cell activation in SpA may be triggered by mechanical stress, infection, or complement activation.", "lineage": "Innate", "markers": ["Fc\u03b5RI+", "c-kit+"], "location": ["synovium", "tissue"], "source": ["CellMarker"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Mast_cell"}, {"id": "cell-nk", "label": "Natural Killer Cell", "type": "Immune Cell", "description": "Natural Killer (NK) cells are innate lymphoid cells that produce IFN-gamma and TNF-alpha, contributing to early immune responses against intracellular pathogens and altered self. NK cells can also interact with dendritic cells to enhance adaptive immune responses in SpA. The role of NK cells in SpA pathogenesis is less well characterized than T cells but contributes to both protective and pathogenic responses.", "lineage": "Innate", "markers": ["CD56+", "CD16+"], "location": ["blood", "synovium"], "source": ["CellMarker"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Natural_killer_cell"}, {"id": "cell-naive-cd4", "label": "Naive CD4+ T Cell", "type": "Immune Cell", "description": "Naive CD4+ T cells are precursor cells that differentiate into Th1, Th2, Th17, or Treg cells depending on the cytokine microenvironment and dendritic cell signals. In SpA, altered dendritic cell signaling biases naive CD4+ T cell differentiation toward Th17 cells through IL-23 and IL-6 signals. The balance of naive T-cell differentiation affects disease progression and inflammatory severity.", "lineage": "Adaptive", "markers": ["CD4+", "CD45RA+", "CCR7+"], "location": ["blood", "lymphoid tissue"], "source": ["CellMarker"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/CD4"}, {"id": "cell-osteoclast", "label": "Osteoclast", "type": "Immune Cell", "description": "Osteoclasts are multinucleated bone-resorbing cells differentiated from monocyte precursors in response to TNF-alpha, IL-17, and RANKL signaling in SpA. These cells create an acidic microenvironment and produce collagenase and other proteases to dissolve bone matrix in SpA, contributing to early bone erosion. Osteoclast formation is a key step in the inflammatory bone loss that occurs early in SpA.", "lineage": "Innate", "markers": ["TRAP+", "CTSK guselkumab) are under investigation as emerging SpA therapies.", "uniprotId": "Q14813", "gene": "IL23A", "family": "IL-12 family", "role": "Pro-inflammatory", "source": ["UniProt"], "confidence": "high", "references": ["22553110", "25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Interleukin_23"}, {"id": "cytokine-tnf-alpha", "label": "TNF-\u03b1", "type": "Cytokine", "description": "TNF-alpha is the primary pro-inflammatory cytokine driving SpA pathogenesis, produced by macrophages, T cells, and dendritic cells. TNF-alpha activates NF-kB, induces RANKL expression, recruits immune cells, and drives systemic inflammation in SpA. TNF-alpha neutralization is the most successful biologic therapy in SpA.", "uniprotId": "P01375", "gene": "TNF", "family": "TNF superfamily", "role": "Pro-inflammatory", "source": ["UniProt"], "confidence": "high", "references": ["22553110", "25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Tumor_necrosis_factor"}, {"id": "cytokine-il22", "label": "IL-22", "type": "Cytokine", "description": "IL-22 is a cytokine produced by Th17 cells, Th22 cells, and innate lymphoid cells that signals through IL-22R1 on epithelial and stromal cells. IL-22 promotes epithelial barrier function and tissue regeneration but can also enhance inflammation in the context of SpA. IL-22 levels are elevated in active AS and may contribute to enthesial inflammation and new bone formation.", "uniprotId": "Q9GZX6", "gene": "IL22", "family": "IL-10 family", "role": "Pleiotropic", "source": ["UniProt"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Interleukin_22"}, {"id": "cytokine-il6", "label": "IL-6", "type": "Cytokine", "description": "IL-6 is a multifunctional cytokine produced by macrophages, dendritic cells, and T cells that drives STAT3 and NF-kB activation in SpA. IL-6 induces systemic inflammation, B-cell differentiation to antibody-producing cells, and elevated C-reactive protein (CRP) levels characteristic of active disease. IL-6 receptor blockade demonstrates therapeutic benefit in SpA, particularly in TNF-refractory patients.", "uniprotId": "P05231", "gene": "IL6", "family": "IL-6 family", "role": "Pleiotropic", "source": ["UniProt"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Interleukin_6"}, {"id": "cytokine-il1b", "label": "IL-1\u03b2", "type": "Cytokine", "description": "IL-1-beta (IL-1\u03b2) is produced by macrophages through inflammasome activation in response to TNF-alpha and danger-associated molecular patterns. IL-1\u03b2 drives osteoclastogenesis, synovial inflammation, and systemic acute phase responses in SpA. IL-1 inhibitors (anakinra, canakinumab) show efficacy in TNF-refractory SpA.", "uniprotId": "P01584", "gene": "IL1B", "family": "IL-1 family", "role": "Pro-inflammatory", "source": ["UniProt"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Interleukin_1"}, {"id": "cytokine-ifn-gamma", "label": "IFN-\u03b3", "type": "Cytokine", "description": "IFN-gamma (Interferon-gamma) is a Th1-derived cytokine produced by CD4+ and CD8+ T cells that activates macrophages and enhances antigen presentation. Elevated IFN-gamma is found in SpA and represents both protective (pathogen control) and pathogenic (chronic inflammation) functions. The balance between IFN-gamma and IL-17 production differs across SpA disease stages.", "uniprotId": "P01579", "gene": "IFNG", "family": "Type II interferon", "role": "Pro-inflammatory", "source": ["UniProt"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Interferon_gamma"}, {"id": "cytokine-tgf-beta", "label": "TGF-\u03b2", "type": "Cytokine", "description": "TGF-beta is a pleiotropic cytokine with context-dependent pro- and anti-inflammatory roles in SpA pathogenesis and tissue remodeling. TGF-beta signaling promotes both Treg differentiation (anti-inflammatory) and Th17 differentiation (pro-inflammatory) depending on cytokine context. Dysregulated TGF-beta signaling contributes to impaired immune tolerance in SpA.", "uniprotId": "P01137", "gene": "TGFB1", "family": "TGF-\u03b2 superfamily", "role": "Pleiotropic", "source": ["UniProt"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Transforming_growth_factor_beta"}, {"id": "cytokine-il10", "label": "IL-10", "type": "Cytokine", "description": "IL-10 is a regulatory cytokine produced by regulatory T cells, B cells, and alternatively activated macrophages that suppresses pro-inflammatory responses. IL-10 levels are often reduced relative to pro-inflammatory cytokines in SpA, suggesting a deficiency in immune regulation that allows Th17 and TNF-driven inflammation. Impaired IL-10 production may contribute to the chronic nature of SpA.", "uniprotId": "P22301", "gene": "IL10", "family": "IL-10 family", "role": "Anti-inflammatory", "source": ["UniProt"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Interleukin_10"}, {"id": "cytokine-gm-csf", "label": "GM-CSF", "type": "Cytokine", "description": "GM-CSF (Granulocyte-Macrophage Colony-Stimulating Factor) is a cytokine produced by T cells and fibroblasts that promotes myeloid cell differentiation and activation. GM-CSF drives macrophage and dendritic cell expansion and pro-inflammatory polarization in SpA. GM-CSF levels are elevated in SpA synovial fluid and contribute to myeloid cell-driven inflammation.", "uniprotId": "P04141", "gene": "CSF2", "family": "Colony-stimulating factor", "role": "Pro-inflammatory", "source": ["UniProt"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/GM-CSF"}, {"id": "cytokine-ccl20", "label": "CCL20", "type": "Cytokine", "description": "CCL20 (C-C Chemokine Ligand 20) is a chemokine produced by epithelial and immune cells that recruits CCR6-expressing cells including Th17, \ n immune cells and soluble IL-6R shed from cells. IL-6R signaling through gp130 activates STAT3 and NF-kB, driving B-cell and T-cell responses and systemic inflammation in SpA. Both membrane-bound and soluble IL-6R are therapeutic targets, with tocilizumab blocking both forms and showing efficacy in TNF-refractory SpA.", "uniprotId": "P08887", "gene": "IL6R", "cellExpression": ["T cell", "B cell", "monocyte"], "source": ["UniProt"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Interleukin-6_receptor"}, {"id": "receptor-jak1", "label": "JAK1", "type": "Receptor", "description": "JAK1 (Janus Kinase 1) is a tyrosine kinase that transduces signaling from IL-23, IL-6, and type I interferon receptors in immune cells. JAK1 phosphorylates STAT3 downstream of IL-23 signaling driving Th17 differentiation in SpA. JAK1-selective inhibitors are under investigation in SpA.", "uniprotId": "P23458", "gene": "JAK1", "cellExpression": ["all hematopoietic cells"], "source": ["UniProt"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/JAK1"}, {"id": "receptor-jak2", "label": "JAK2", "type": "Receptor", "description": "JAK2 (Janus Kinase 2) is a tyrosine kinase that transduces signaling from IL-23 and growth hormone receptors in immune and stromal cells. JAK2 cooperates with TYK2 downstream of IL-23R to activate STAT3 and STAT5 in Th17 differentiation. JAK2 inhibitors are under investigation in SpA alongside JAK1 inhibitors.", "uniprotId": "P52333", "gene": "JAK2", "cellExpression": ["all hematopoietic cells"], "source": ["UniProt"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/JAK2"}, {"id": "receptor-tyk2", "label": "TYK2", "type": "Receptor", "description": "TYK2 (Tyrosine Kinase 2) is a JAK family kinase critical for IL-23 signal transduction to STAT3 and STAT5. TYK2 polymorphisms show strong AS associations and affect IL-23-mediated Th17 differentiation and innate immune activation. TYK2 inhibitors are emerging as selective alternatives to broad JAK inhibition.", "uniprotId": "P29597", "gene": "TYK2", "cellExpression": ["immune cells"], "source": ["UniProt"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/TYK2"}, {"id": "receptor-stat3", "label": "STAT3", "type": "Receptor", "description": "STAT3 (Signal Transducer and Activator of Transcription 3) is a transcription factor downstream of IL-23 and IL-6 signaling critical for Th17 cell differentiation. STAT3 phosphorylation and activation drives ROR\u03b3t expression and IL-17 production in Th17 cells. STAT3 inhibitors are being developed as potential SpA therapeutics.", "uniprotId": "P40763", "gene": "STAT3", "cellExpression": ["immune cells"], "source": ["UniProt"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/STAT3"}, {"id": "gene-hla-b27", "label": "HLA-B27", "type": "Gene", "description": "HLA-B27 is an MHC class I molecule with strong association to AS (88-90% of patients) through both peptide presentation and disease-associated misfolding. HLA-B27 positivity is the strongest genetic risk factor for AS, and specific alleles (*05:01) show higher disease associations. HLA-B27 allelic variation affects peptide binding and misfolding propensity in SpA.", "chromosome": "6p21.3", "rsId": ["rs4349859"], "oddsRatio": 200, "gwasSource": "Multiple GWAS meta-analyses", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "high", "references": ["22553110", "25180821"], "wikipedia": "https://en.wikipedia.org/wiki/HLA-B27"}, {"id": "gene-erap1", "label": "ERAP1", "type": "Gene", "description": "ERAP1 (Endoplasmic Reticulum Aminopeptidase 1) is a gene encoding an aminopeptidase that trims peptides in the endoplasmic reticulum for optimal MHC class I binding. ERAP1 variants show strong epistatic interactions with HLA-B27, significantly increasing AS risk through impaired peptide processing and presentation. This suggests that both HLA-B27 misfolding and ERAP1-mediated peptide trimming defects contribute to aberrant immune responses in SpA pathogenesis.", "chromosome": "5q15", "rsId": ["rs30187"], "oddsRatio": 1.34, "gwasSource": "SpA GWAS", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/ERAP1"}, {"id": "gene-erap2", "label": "ERAP2", "type": "Gene", "description": "ERAP2 (Endoplasmic Reticulum Aminopeptidase 2) is a paralog of ERAP1 that trims peptides in the ER for MHC class I binding. ERAP2 shows epistatic interactions with HLA-B27 similar to ERAP1, and genetic variants affect AS risk through peptide processing and presentation. The ERAP1-ERAP2 interaction suggests redundancy in peptide trimming for HLA-B27.", "chromosome": "5q15", "rsId": ["rs2248374"], "oddsRatio": 1.2, "gwasSource": "SpA GWAS", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/ERAP2"}, {"id": "gene-il23r", "label": "IL23R", "type": "Gene", "description": "IL23R (Interleukin-23 Receptor) encodes a subunit of the IL-23 receptor, critical for IL-23 signaling in immune cells including Th17 cells and innate lymphoid cells. Polymorphisms in IL23R show genome-wide significant associations with AS and other forms of SpA, implicating the IL-23/Th17 axis as a key pathogenic mechanism. Loss-of-function variants are protective, making IL-23 signaling an attractive therapeutic target in SpA.", "chromosome": "1p13.3", "rsId": ["rs11209026"], "oddsRatio": 0.59, "gwasSource": "Multiple SpA GWAS", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "high", "references": ["22553110", "25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Interleukin_23"}, {"id": "gene-card9", "label": "CARD9", "type": "Gene", "description": "CARD9 (Caspase Recruitment Domain 9) encodes a signaling adapter protein in fungal and bacterial pattern recognition pathways that activates NF-kB and MAPK. CARD9 polymorphisms show associations with AS and other autoimmune diseases, implicating pattern recognition receptor signaling in SpA pathogenesis. CARD9 mutations alter immune responses to commensals.", "chromosome": "9q34.3", "rsId": ["rs4077515"], "oddsRatio": 1.18, "gwasSource": "SpA GWAS", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/CARD9"}, {"id": "gene-runx3", "label": "RUNX3", "type": "Gene", "description": "RUNX3 is a transcription factor critical for CD8+ T-cell development and Th17 differentiation, encoded by a gene with AS-associated polymorphisms. RUNX3 mutations affect both CD8+ T-cell function and Th17 differentiation, potentially explaining SpA susceptibility. RUNX3 dysregulation may alter cross-reactive CD8+ T-cell responses in HLA-B27-driven SpA.", "chromosome": "1p36.11", "rsId": ["rs4648356"], "oddsRatio": 1.15, "gwasSource": "SpA GWAS", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/RUNX3"}, {"id": "gene-tyk2", "label": "TYK2", "type": "Gene", "description": "TYK2 encodes Tyrosine Kinase 2, a JAK family kinase that transduces IL-23 signaling through STAT3 and STAT5. TYK2 genetic variants showing AS associations affect IL-23-mediated Th17 differentiation and innate immune responses. TYK2 inhibitors are emerging therapies targeting the IL-23 pathway in SpA.", "chromosome": "19p13.2", "rsId": ["rs12720356"], "oddsRatio": 1.2, "gwasSource": "SpA GWAS", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/TYK2"}, {"id": "gene-il1r2", "label": "IL1R2", "type": "Gene", "description": "IL1R2 encodes IL-1 Receptor 2, a decoy receptor that absorbs IL-1 and prevents IL-1R1 signaling, dampening IL-1 responses. Polymorphisms in IL1R2 may alter IL-1 signaling balance in SpA inflammation. Impaired decoy receptor function could enhance pathogenic IL-1 effects in SpA.", "chromosome": "2q14.2", "rsId": ["rs1939800"], "oddsRatio": 1.12, "gwasSource": "SpA GWAS", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Interleukin_1_receptor"}, {"id": "gene-ptger4", "label": "PTGER4", "type": "Gene", "description": "PTGER4 encodes Prostaglandin E Receptor 4 (EP4) that mediates anti-inflammatory PGE2 signaling in immune cells. PTGER4 polymorphisms show associations with AS, suggesting altered prostaglandin signaling in SpA. EP4 signaling promotes Treg differentiation and tolerance, and genetic variants may impair these protective responses.", "chromosome": "5p13.1", "rsId": ["rs1893592"], "oddsRatio": 1.15, "gwasSource": "SpA GWAS", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Prostaglandin_E_receptor"}, {"id": "gene-ltbr", "label": "LTBR", "type": "Gene", "description": "LTBR (Lymphotoxin Beta Receptor) transduces non-canonical NF-kB signaling important for secondary lymphoid organ development and lymphoid structure formation. LTBR polymorphisms show associations with AS, implicating lymphoid tissue organization in SpA pathogenesis. LTBR signaling may affect ectopic lymphoid structure formation in SpA.", "chromosome": "13q31.3", "rsId": ["rs6565694"], "oddsRatio": 1.13, "gwasSource": "SpA GWAS", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Lymphotoxin"}, {"id": "gene-npepps", "label": "NPEPPS", "type": "Gene", "description": "NPEPPS encodes puromycin-sensitive aminopeptidase that processes peptides in the cytosol for MHC presentation. NPEPPS genetic variants show associations with AS and affect peptide processing alongside ERAP1 and ERAP2. Combinatorial effects of multiple peptide-processing genes influence HLA-B27 peptide presentation in SpA.", "chromosome": "17q21.2", "rsId": ["rs2230173"], "oddsRatio": 1.1, "gwasSource": "SpA GWAS", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/NPEPPS"}, {"id": "gene-gpr25", "label": "GPR25", "type": "Gene", "description": "GPR25 encodes a G protein-coupled receptor involved in immune cell chemotaxis and cytokine signaling. GPR25 polymorphisms show associations with AS, implicating altered chemokine signaling in SpA pathogenesis. GPR25 function in T-cell trafficking may affect immune cell recruitment to inflamed sites.", "chromosome": "1p13.3", "rsId": ["rs10489629"], "oddsRatio": 1.09, "gwasSource": "SpA GWAS", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/G_protein-coupled_receptor"}, {"id": "gene-ube2l3", "label": "UBE2L3", "type": "Gene", "description": "UBE2L3 encodes an E2 ubiquitin-conjugating enzyme involved in protein ubiquitination and degradation in immune signaling. UBE2L3 polymorphisms show associations with AS and other autoimmune diseases, affecting NF-kB and MAPK pathway signaling. Altered ubiquitination of immune signaling proteins may dysregulate inflammatory responses.", "chromosome": "22q11.21", "rsId": ["rs6427528"], "oddsRatio": 1.13, "gwasSource": "SpA GWAS", "source": ["NCBI Gene", "GWAS Catalog"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/UBE2L3"}, {"id": "pathway-il23-il17-axis", "label": "IL-23/IL-17 Axis", "type": "Pathway", "description": "The IL-23/IL-17 axis represents the central inflammatory pathway in SpA pathogenesis, with IL-23 driving Th17 and ILC differentiation and IL-17 driving osteoclastogenesis. Multiple genetic associations in AS point to components of this axis (IL23R, IL12B), and IL-23 and IL-17 inhibitors show superior efficacy in SpA. The IL-23/IL-17 axis is the most validated therapeutic target in SpA.", "reactomeId": "R-HSA-381340", "keggId": "hsa04657", "source": ["Reactome", "KEGG"], "confidence": "high", "references": ["22553110", "23676134"], "wikipedia": "https://en.wikipedia.org/wiki/Interleukin_23"}, {"id": "pathway-jak-stat", "label": "JAK-STAT Signaling", "type": "Pathway", "description": "JAK-STAT signaling downstream of IL-23 and IL-6 receptors drives Th17 differentiation and pro-inflammatory gene expression in SpA. TYK2 and JAK2 transduce IL-23 signaling to phosphorylate STAT3, a critical event in Th17 commitment. JAK inhibitors targeting this pathway are under investigation as emerging SpA therapies.", "reactomeId": "R-HSA-8849471", "keggId": "hsa04900", "source": ["Reactome", "KEGG"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/JAK-STAT_signaling_pathway"}, {"id": "pathway-nf-kappa-b", "label": "NF-\u03baB Signaling", "type": "Pathway", "description": "NF-kB signaling is the central transcription factor activated by TNF-alpha, IL-1, and pattern recognition receptors, driving pro-inflammatory gene expression in SpA. Canonical NF-kB activation leads to TNF, IL-6, and IL-8 expression, while non-canonical pathways affect immune tolerance and lymphoid tissue organization. NF-kB represents a key node in SpA inflammation converging multiple cytokine signals.", "reactomeId": "R-HSA-5602503", "keggId": "hsa04064", "source": ["Reactome", "KEGG"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/NF-kappa-B"}, {"id": "pathway-th17-diff", "label": "Th17 Differentiation", "type": "Pathway", "description": "Th17 differentiation requires IL-23 and IL-6 signals to naive CD4+ T cells in the context of dendritic cell-derived signals and STAT3 activation. TGF-beta and IL-6 initiate Th17 commitment through ROR\u03b3t and STAT3 expression, while IL-23 maintains and expands Th17 cells in SpA. Dysregulation of Th17 differentiation drives pathogenic Th17 accumulation in SpA.", "reactomeId": "R-HSA-2690814", "keggId": "hsa04659", "source": ["Reactome", "KEGG"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/T_helper_17_cell"}, {"id": "pathway-er-stress-upr", "label": "ER Stress and Unfolded Protein Response", "type": "Pathway", "description": "ER Stress and the Unfolded Protein Response (UPR) are activated by HLA-B27 misfolding and trigger NF-kB-mediated pro-inflammatory responses in SpA. HLA-B27 molecules in certain alleles have increased propensity for ER accumulation and misfolding, activating IRE1 and ATF6 branches of the UPR. ER stress-induced inflammation may explain the AS-HLA-B27 association independent of peptide presentation.", "reactomeId": "R-HSA-381070", "keggId": "hsa04141", "source": ["Reactome", "KEGG"], "confidence": "medium", "references": ["27195436"], "wikipedia": "https://en.wikipedia.org/wiki/Unfolded_protein_response"}, {"id": "pathway-wnt-signaling", "label": "Wnt Signaling (Bone Formation)", "type": "Pathway", "description": "Wnt signaling through \u03b2-catenin (canonical) promotes osteoblast differentiation and bone formation in SpA, contributing to the paradoxical new bone and ankylosis. Wnt ligands are produced at SpA inflammation sites and drive osteogenesis through Wnt/\u03b2-catenin pathway activation. Wnt pathway inhibitors (sclerostin antibodies, DKK inhibitors) are being investigated to block SpA-associated bone formation.", "reactomeId": "R-HSA-881907", "keggId": "hsa04310", "source": ["Reactome", "KEGG"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Wnt_signaling_pathway"}, {"id": "pathway-rankl-opg", "label": "RANKL/OPG (Bone Resorption)", "type": "Pathway", "description": "The RANKL/OPG (Osteoprotegerin) pathway controls the balance between osteoclastogenesis and osteoblast-mediated bone formation in SpA. RANKL-RANK signaling is enhanced by TNF-alpha and IL-17, driving bone resorption, while OPG acts as a decoy to inhibit RANKL. Dysregulation of this pathway leads to both inflammatory bone loss and paradoxical new bone formation in SpA.", "reactomeId": "R-HSA-2029513", "keggId": "hsa04380", "source": ["Reactome", "KEGG"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/RANKL"}, {"id": "pathway-autophagy", "label": "Autophagy", "type": "Pathway", "description": "Autophagy is a cellular degradation pathway that regulates immune cell homeostasis and pathogen clearance. Dysregulation of autophagy has been implicated in SpA pathogenesis through impaired bacterial handling and immune cell activation. Autophagy-defective immune cells may have enhanced pro-inflammatory responses in SpA.", "reactomeId": "R-HSA-383108", "keggId": "hsa04140", "source": ["Reactome", "KEGG"], "confidence": "medium", "references": ["27195436"], "wikipedia": "https://en.wikipedia.org/wiki/Autophagy"}, {"id": "symptom-ibp", "label": "Inflammatory Back Pain", "type": "Symptom", "description": "Inflammatory Back Pain (IBP) is the cardinal symptom of axial SpA, characterized by pain and stiffness improving with activity and worsening with rest. IBP typically begins before age 45, improves with NSAIDs, and is associated with morning stiffness >30 minutes. IBP ASAS classification criteria are 80-90% sensitive for axial SpA diagnosis.", "hpoId": "HP:0025435", "frequency": "70-90% in SpA", "category": "Axial", "source": ["HPO", "EULAR"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Back_pain"}, {"id": "symptom-sacroiliitis", "label": "Sacroiliitis", "type": "Symptom", "description": "Sacroiliitis (inflammation of sacroiliac joints) is the radiographic hallmark of AS, showing bilateral symmetric changes with erosions and ankylosis. Sacroiliitis can be asymptomatic in early disease but eventually causes pain and stiffness in the buttocks and lower back. Bilateral sacroiliitis is required for AS diagnosis under modified New York criteria.", "hpoId": "HP:0012507", "frequency": "80-100% in AS", "category": "Axial", "source": ["HPO", "EULAR"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Sacroiliitis"}, {"id": "symptom-enthesitis", "label": "Enthesitis", "type": "Symptom", "description": "Enthesitis (inflammation at tendon/ligament insertions) is a characteristic feature of SpA that distinguishes it from rheumatoid arthritis. Common sites include the Achilles insertion, plantar fascia insertion, and anterior tibial tuberosity. Enthesitis causes pain at tendon attachment sites and is a target of ASAS classification criteria for SpA.", "hpoId": "HP:0009043", "frequency": "30-50% in SpA", "category": "Peripheral", "source": ["HPO", "EULAR"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Enthesitis"}, {"id": "symptom-peripheral-arthritis", "label": "Peripheral Arthritis", "type": "Symptom", "description": "Peripheral arthritis (inflammation in small and large joints of limbs) is a prominent feature of PsA and occurs in ~30% of axial SpA patients. Peripheral SpA can present as oligoarthritis (typically knees, hips, ankles) or polyarthritis, with potential for permanent joint damage if untreated. Peripheral disease often responds more dramatically than axial disease to TNF inhibitors.", "hpoId": "HP:0001369", "frequency": "30-40% in SpA", "category": "Peripheral", "source": ["HPO", "EULAR"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Arthritis"}, {"id": "symptom-dactylitis", "label": "Dactylitis", "type": "Symptom", "description": "Dactylitis (swollen digit) is a hallmark manifestation of PsA and represents simultaneous inflammation of bone, synovium, and soft tissues in fingers or toes. Dactylitis occurs in 15-50% of PsA patients and indicates more aggressive disease with greater structural damage. Dactylitis responds well to TNF inhibitors and IL-17 inhibitors.", "hpoId": "HP:0009027", "frequency": "10-20% in SpA, 40% in PsA", "category": "Peripheral", "source": ["HPO", "EULAR"], "confidence": "high", "references": ["29145608"], "wikipedia": "https://en.wikipedia.org/wiki/Dactylitis"}, {"id": "symptom-uveitis", "label": "Anterior Uveitis", "type": "Symptom", "description": "Anterior uveitis (iritis) is an acute inflammatory eye manifestation occurring in 20-30% of AS and 5-10% of other SpA subtypes. Uveitis in SpA is HLA-B27-mediated and often recurrent, caused by IL-17 and TNF-alpha-driven immune activation at the uveal tract. Untreated uveitis can lead to vision loss, cataracts, and glaucoma.", "hpoId": "HP:0000496", "frequency": "20-30% in AS", "category": "Extra-articular", "source": ["HPO", "EULAR"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Anterior_uveitis"}, {"id": "symptom-psoriasis", "label": "Psoriasis", "type": "Symptom", "description": "Psoriasis is present at SpA diagnosis in 70% of PsA patients and develops within 10 years in others, indicating shared immune dysregulation. Psoriatic skin lesions contain IL-17-producing Th17 cells and express TNF-alpha, paralleling joint inflammation. Skin manifestations guide biologic selection toward TNF and IL-17 inhibitors.", "hpoId": "HP:0000969", "frequency": "10-15% in AS, 70% in PsA", "category": "Extra-articular", "source": ["HPO", "EULAR"], "confidence": "high", "references": ["29145608"], "wikipedia": "https://en.wikipedia.org/wiki/Psoriasis"}, {"id": "symptom-ibd", "label": "Inflammatory Bowel Disease", "type": "Symptom", "description": "Inflammatory Bowel Disease (IBD) is a comorbid manifestation occurring in 5-10% of SpA patients as enteropathic arthritis or in non-IBD SpA subtypes. Shared mucosal immune dysregulation and dysbiosis link IBD and SpA pathogenesis. IBD and SpA in the same patient requires integrated biologic therapy selection.", "hpoId": "HP:0002037", "frequency": "5-10% in SpA", "category": "Extra-articular", "source": ["HPO", "EULAR"], "confidence": "high", "references": ["27660185"], "wikipedia": "https://en.wikipedia.org/wiki/Inflammatory_bowel_disease"}, {"id": "symptom-fatigue", "label": "Fatigue", "type": "Symptom", "description": "Fatigue is a prevalent and debilitating symptom in SpA affecting 40-70% of patients and correlating with disease activity, depression, and sleep disturbance. IL-6 and TNF-alpha produced during SpA inflammation may contribute to fatigue through central nervous system effects. Fatigue often persists despite good disease control and impacts quality of life.", "hpoId": "HP:0012378", "frequency": "40-60% in SpA", "category": "Extra-articular", "source": ["HPO"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Fatigue"}, {"id": "symptom-morning-stiffness", "label": "Morning Stiffness", "type": "Symptom", "description": "Morning stiffness lasting >30 minutes upon waking is a key symptom of active axial SpA reflecting overnight accumulation of inflammatory mediators. Stiffness improves dramatically with NSAIDs and activity in SpA, contrasting with mechanical back pain. Duration of morning stiffness correlates with disease activity in AS.", "hpoId": "HP:0002959", "frequency": "70-80% in SpA", "category": "Axial", "source": ["HPO"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Morning_stiffness"}, {"id": "symptom-spinal-fusion", "label": "Spinal Fusion/Ankylosis", "type": "Symptom", "description": "Spinal fusion (ankylosis) is the progressive outcome of untreated axial SpA, with syndesmophyte formation bridging vertebral bodies and creating a rigid 'bamboo spine'. Advanced spinal fusion results in complete immobility, increased fracture risk from minor trauma, and severe functional disability. Early biologic therapy can slow or prevent progression to advanced spinal fusion.", "hpoId": "HP:0002938", "frequency": "30-40% in AS over 20 years", "category": "Axial", "source": ["HPO"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Spinal_fusion"}, {"id": "symptom-osteoporosis", "label": "Osteoporosis", "type": "Symptom", "description": "Osteoporosis occurs in 5-60% of SpA patients due to both TNF-alpha-driven bone loss early in disease and paradoxical new bone formation later. Dual-energy X-ray absorptiometry (DXA) scans assess bone mineral density in SpA, with attention to both systemic loss and local new bone. Fracture risk in SpA includes both osteoporotic and new bone-related complications.", "hpoId": "HP:0000939", "frequency": "20-60% in SpA", "category": "Extra-articular", "source": ["HPO"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Osteoporosis"}, {"id": "site-si-joint", "label": "Sacroiliac Joint", "type": "Anatomical Site", "description": "The sacroiliac (SI) joints are the primary sites of inflammation in axial spondyloarthritis, showing early inflammatory changes on MRI before radiographic involvement. Bilateral SI joint inflammation with or without spinal changes defines radiographic SpA (AS), while unilateral or early changes indicate non-radiographic axial SpA. SI joint assessment is central to SpA diagnosis and monitoring.", "uberonId": "UBERON:0001158", "source": ["UBERON"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Sacroiliac_joint"}, {"id": "site-spine", "label": "Spine", "type": "Anatomical Site", "description": "The spine is the primary target organ in axial spondyloarthritis, with inflammatory changes in the discovertebral junctions progressing to syndesmophyte formation and spinal fusion. Spinal ankylosis in advanced AS results in complete immobility and kyphotic deformity, reducing functional capacity. Early recognition and TNF or IL-17 inhibition can slow spinal progression.", "uberonId": "UBERON:0002240", "source": ["UBERON"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Vertebral_column"}, {"id": "site-enthesis", "label": "Enthesis", "type": "Anatomical Site", "description": "The enthesis is the insertion site of tendons and ligaments into bone and is the primary site of inflammation in axial spondyloarthritis. Enthesial inflammation is characterized by TNF-alpha and IL-17 production, HLA-B27 immune cell infiltration, and paradoxical new bone formation. Enthesitis precedes spinal inflammation in early AS.", "uberonId": "UBERON:0009835", "source": ["UBERON"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Enthesis"}, {"id": "site-gut", "label": "Gut (Ileum)", "type": "Anatomical Site", "description": "The gut (intestinal tract) is a key immune interface in SpA pathogenesis where dysbiosis and increased intestinal permeability allow bacterial antigen exposure. Elevated fecal calprotectin indicates intestinal inflammation in enteropathic arthritis and SpA-IBD, and intestinal changes precede clinical SpA. Microbiota modulation and barrier function restoration are emerging therapeutic targets.", "uberonId": "UBERON:0002116", "source": ["UBERON"], "confidence": "high", "references": ["27660185"], "wikipedia": "https://en.wikipedia.org/wiki/Gut"}, {"id": "site-eye-uvea", "label": "Eye (Uvea)", "type": "Anatomical Site", "description": "The eye uvea (iris, ciliary body, choroid) is a site of acute anterior uveitis inflammation in 20-30% of AS and 5-10% of other SpA subtypes. Uveitis in SpA is HLA-B27-mediated and involves IL-17-producing cells and TNF-alpha, with shared pathogenic mechanisms with joint disease. Uveitis requires prompt treatment to prevent vision loss.", "uberonId": "UBERON:0001258", "source": ["UBERON"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Uvea"}, {"id": "site-skin", "label": "Skin", "type": "Anatomical Site", "description": "The skin is a site of psoriasis manifestations in PsA and other SpA subtypes, reflecting systemic IL-17 and TNF-alpha-driven inflammation. Psoriatic skin lesions contain elevated Th17 cells and express IL-17, IL-22, and TNF-alpha. Skin clearance with systemic therapy (TNF inhibitors, IL-17 inhibitors) indicates control of systemic inflammation.", "uberonId": "UBERON:0002097", "source": ["UBERON"], "confidence": "high", "references": ["29145608"], "wikipedia": "https://en.wikipedia.org/wiki/Skin"}, {"id": "site-peripheral-joints", "label": "Peripheral Joints", "type": "Anatomical Site", "description": "Peripheral joints (elbows, hips, knees, ankles, small joints of hands and feet) are sites of symmetric or asymmetric arthritis in SpA, particularly prominent in PsA. Peripheral arthritis can occur with or without axial disease and often responds to TNF inhibitors and IL-17 inhibitors. Imaging and ultrasound assess peripheral joint inflammation and damage.", "uberonId": "UBERON:0002091", "source": ["UBERON"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Joint"}, {"id": "site-achilles", "label": "Achilles Tendon", "type": "Anatomical Site", "description": "The Achilles tendon is a frequent site of enthesitis in SpA, causing pain, swelling, and functional impairment. Achilles enthesitis is characteristic of axial SpA and reactive arthritis and often responds to TNF inhibition or IL-17 inhibition. Imaging and ultrasound can detect Achilles enthesitis and monitor treatment response.", "uberonId": "UBERON:0001384", "source": ["UBERON"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Achilles_tendon"}, {"id": "site-aortic-root", "label": "Aortic Root", "type": "Anatomical Site", "description": "The aortic root is a cardiovascular extra-articular manifestation site in SpA, with chronic TNF-alpha-driven inflammation causing aortic regurgitation. Aortic root inflammation occurs in 1-10% of AS patients and is associated with aortic dilatation and valve insufficiency. Aortic involvement increases cardiovascular mortality in SpA.", "uberonId": "UBERON:0003847", "source": ["UBERON"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Aorta"}, {"id": "trigger-gut-dysbiosis", "label": "Gut Dysbiosis", "type": "Environmental Trigger", "description": "Gut dysbiosis (altered bacterial composition) is documented in SpA with reduced diversity, depletion of anti-inflammatory species, and enrichment of pro-inflammatory bacteria. Dysbiosis increases intestinal permeability, allows pathogenic bacterial translocation, and drives Th17 differentiation. Dysbiosis precedes and perpetuates SpA pathogenesis through barrier dysfunction.", "mechanism": "Increased intestinal permeability, reduced barrier function, altered mucosal immunity", "source": ["Literature"], "confidence": "high", "references": ["27660185"], "wikipedia": "https://en.wikipedia.org/wiki/Dysbiosis"}, {"id": "trigger-mechanical-stress", "label": "Mechanical Stress", "type": "Environmental Trigger", "description": "Mechanical stress from trauma or repetitive microtrauma may trigger inflammation at enthesial sites in SpA through toll-like receptor activation and danger signal release. Stress-induced inflammation at the enthesis may break immunological tolerance and initiate or perpetuate SpA. Enthesitis distribution often follows mechanical stress patterns.", "mechanism": "Triggers local inflammation and innate immune activation via danger signals", "source": ["Literature"], "confidence": "medium", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Mechanical_stress"}, {"id": "trigger-bacterial-infection", "label": "Bacterial Infection", "type": "Environmental Trigger", "description": "Bacterial infections by Chlamydia, Shigella, Salmonella, Yersinia, and other pathogens trigger reactive arthritis in HLA-B27-positive individuals through molecular mimicry and cross-reactivity. Post-infectious arthritis typically develops 1-4 weeks after acute GI or urogenital infection. Bacterial triggers represent the clearest link between microbes and SpA pathogenesis.", "mechanism": "Molecular mimicry, cross-reactive T cells, persistent bacterial antigens", "source": ["Literature"], "confidence": "high", "references": ["19654303"], "wikipedia": "https://en.wikipedia.org/wiki/Bacterial_infection"}, {"id": "trigger-smoking", "label": "Smoking", "type": "Environmental Trigger", "description": "Smoking is a modifiable risk factor that increases SpA disease severity, radiographic progression, and poor response to TNF inhibitors. Smoking impairs immune function and increases systemic TNF-alpha levels independent of SpA, amplifying inflammation. Smoking cessation is strongly recommended as part of comprehensive SpA management.", "mechanism": "Enhanced Th17 differentiation, increased TNF-\u03b1 production, altered immune tolerance", "source": ["Literature"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Smoking"}, {"id": "trigger-psychological-stress", "label": "Psychological Stress", "type": "Environmental Trigger", "description": "Psychological stress is associated with SpA disease flares through neuroimmune mechanisms including norepinephrine signaling and reduced regulatory T-cell function. Stress hormones can promote Th17 differentiation and reduce Treg function, exacerbating SpA inflammation. Stress management and psychosocial support are important adjunctive interventions in SpA.", "mechanism": "Dysregulation of HPA axis, altered immune homeostasis", "source": ["Literature"], "confidence": "medium", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Psychological_stress"}, {"id": "trigger-nsaid-withdrawal", "label": "NSAID Withdrawal", "type": "Environmental Trigger", "description": "NSAID withdrawal or inadequate NSAID use can lead to SpA disease flares through loss of prostaglandin-mediated anti-inflammatory effects. Continuous NSAID therapy is recommended in SpA for maintenance of anti-inflammatory benefit and slowing of radiographic progression. Abrupt NSAID discontinuation should be avoided without alternative disease-modifying therapy.", "mechanism": "Rebound inflammation, loss of anti-inflammatory effects", "source": ["Literature"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Nonsteroidal_anti-inflammatory_drug"}, {"id": "microbe-klebsiella", "label": "Klebsiella pneumoniae", "type": "Microorganism", "description": "Klebsiella pneumoniae is a gram-negative opportunistic pathogen implicated in SpA pathogenesis through molecular mimicry with HLA-B27 and dysbiosis. Increased Klebsiella prevalence in SpA patient stool samples and cross-reactive antibodies against Klebsiella epitopes suggest pathogenic triggering. The Klebsiella/HLA-B27 cross-reactivity hypothesis is supported by immunological studies.", "taxonomy": "Enterobacteriaceae family", "association": "Increased in SpA", "source": ["Literature"], "confidence": "medium", "references": ["27660185"], "wikipedia": "https://en.wikipedia.org/wiki/Klebsiella_pneumoniae"}, {"id": "microbe-ruminococcus", "label": "Ruminococcus gnavus", "type": "Microorganism", "description": "Ruminococcus gnavus is a commensal bacterium that is enriched in IBD and may promote pro-inflammatory immune responses through antigen exposure. R. gnavus abundance in SpA-IBD patients may contribute to both intestinal and articular inflammation. Changes in Ruminococcus abundance reflect dysbiosis and altered immune tolerance in SpA.", "taxonomy": "Firmicutes phylum", "association": "Increased in SpA", "source": ["Literature"], "confidence": "medium", "references": ["27660185"], "wikipedia": "https://en.wikipedia.org/wiki/Ruminococcus"}, {"id": "microbe-faecalibacterium", "label": "Faecalibacterium prausnitzii", "type": "Microorganism", "description": "Faecalibacterium prausnitzii is a commensal bacterium depleted in SpA patient fecal samples, representing loss of potentially protective bacteria in gut dysbiosis. F. prausnitzii produces anti-inflammatory metabolites including butyrate and promotes barrier integrity and Treg differentiation. Reduction of F. prausnitzii abundance in SpA may contribute to pathogenic immune activation.", "taxonomy": "Firmicutes phylum", "association": "Decreased in SpA", "source": ["Literature"], "confidence": "high", "references": ["27660185"], "wikipedia": "https://en.wikipedia.org/wiki/Faecalibacterium"}, {"id": "microbe-prevotella", "label": "Prevotella copri", "type": "Microorganism", "description": "Prevotella copri is a commensal bacterium enriched in early rheumatoid arthritis and depleted in some SpA patient microbiota. P. copri reduction in SpA may represent loss of a regulatory species or enrichment of pathogenic species. Dysbiosis of Prevotella and related anaerobes contributes to barrier dysfunction and pathogenic immune activation.", "taxonomy": "Bacteroidetes phylum", "association": "Increased in SpA", "source": ["Literature"], "confidence": "medium", "references": ["27660185"], "wikipedia": "https://en.wikipedia.org/wiki/Prevotella"}, {"id": "microbe-chlamydia", "label": "Chlamydia trachomatis", "type": "Microorganism", "description": "Chlamydia trachomatis is an obligate intracellular pathogen causing urogenital infections that frequently triggers reactive arthritis, particularly in HLA-B27-positive individuals. Chlamydia antigens trigger cross-reactive T-cell and antibody responses with joint epitopes through molecular mimicry with HLA-B27. Post-Chlamydia reactive arthritis is a major subset of SpA.", "taxonomy": "Chlamydiaceae family", "association": "Triggers reactive arthritis", "source": ["Literature"], "confidence": "high", "references": ["19654303"], "wikipedia": "https://en.wikipedia.org/wiki/Chlamydia_trachomatis"}, {"id": "microbe-campylobacter", "label": "Campylobacter", "type": "Microorganism", "description": "Campylobacter jejuni is a gram-negative bacterium causing gastrointestinal infection that can trigger reactive arthritis, particularly in HLA-B27-positive individuals. Campylobacter infection precedes reactive arthritis development by 1-4 weeks and activates cross-reactive T-cell responses. Post-Campylobacter reactive arthritis may progress to chronic SpA in genetically susceptible patients.", "taxonomy": "Campylobacteraceae family", "association": "Triggers reactive arthritis", "source": ["Literature"], "confidence": "high", "references": ["19654303"], "wikipedia": "https://en.wikipedia.org/wiki/Campylobacter_jejuni"}, {"id": "drug-adalimumab", "label": "Adalimumab", "type": "Drug", "description": "Adalimumab (brand name Humira) is a recombinant human monoclonal antibody against TNF-alpha approved by the FDA for AS, PsA, and other SpA subtypes. As a TNF inhibitor, adalimumab neutralizes both soluble and membrane-bound TNF-alpha, blocking TNF-R1 and TNF-R2 signaling and reducing pro-inflammatory responses. Adalimumab can be given as subcutaneous injection every 1-2 weeks and is one of the most widely used first-line biologic therapies in SpA.", "drugBankId": "DB00051", "class": "TNF inhibitor", "approvalStatus": "FDA/EMA approved for AS, PsA, non-radiographic axSpA", "source": ["DrugBank"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Adalimumab"}, {"id": "drug-etanercept", "label": "Etanercept", "type": "Drug", "description": "Etanercept (Enbrel) is a recombinant TNF receptor-Fc fusion protein that acts as a TNF decoy receptor, binding and neutralizing TNF-alpha and TNF-beta (lymphotoxin). FDA-approved for AS and other SpA, etanercept is a first-line TNF inhibitor given as twice-weekly subcutaneous injections or once-weekly with lower dosing. Etanercept blocks both soluble and membrane-bound TNF-alpha and shows sustained efficacy in SpA over long-term follow-up.", "drugBankId": "DB00041", "class": "TNF inhibitor", "approvalStatus": "FDA/EMA approved for AS, PsA", "source": ["DrugBank"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Etanercept"}, {"id": "drug-infliximab", "label": "Infliximab", "type": "Drug", "description": "Infliximab (Remicade) is a chimeric mouse-human monoclonal antibody against TNF-alpha approved for AS, PsA, and enteropathic arthritis in the SpA spectrum. As a TNF inhibitor, infliximab is administered intravenously every 6-8 weeks after induction, induces formation of TNF immune complexes, and activates complement-mediated cytotoxicity of TNF-producing cells. Infliximab shows potent anti-inflammatory efficacy in SpA but requires intravenous infusions.", "drugBankId": "DB00065", "class": "TNF inhibitor", "approvalStatus": "FDA/EMA approved for AS, PsA", "source": ["DrugBank"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Infliximab"}, {"id": "drug-secukinumab", "label": "Secukinumab", "type": "Drug", "description": "Secukinumab (Cosentyx) is a fully human monoclonal antibody against IL-17A approved as a first-line biologic for AS and PsA with superior efficacy in some patients compared to TNF inhibitors. As an IL-17 inhibitor, secukinumab blocks IL-17-driven osteoclastogenesis, neutrophil recruitment, and pro-inflammatory mediator production, showing rapid clinical improvement in AS. Secukinumab is administered as monthly subcutaneous injections and represents the first IL-17 inhibitor approved for SpA.", "drugBankId": "DB09073", "class": "IL-17A inhibitor", "approvalStatus": "FDA/EMA approved for AS, PsA, non-radiographic axSpA", "source": ["DrugBank"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Secukinumab"}, {"id": "drug-ixekizumab", "label": "Ixekizumab", "type": "Drug", "description": "Ixekizumab (Taltz) is a fully human monoclonal antibody against IL-17A approved for AS, PsA, and non-radiographic axial SpA with efficacy comparable to TNF inhibitors. As an IL-17 inhibitor, ixekizumab blocks IL-17A-mediated inflammation, osteoclastogenesis, and tissue damage through high-affinity antibody binding. Ixekizumab is administered every 2-4 weeks subcutaneously and is a key option in IL-17-targeted SpA therapy.", "drugBankId": "DB09075", "class": "IL-17A inhibitor", "approvalStatus": "FDA/EMA approved for AS, PsA", "source": ["DrugBank"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Ixekizumab"}, {"id": "drug-guselkumab", "label": "Guselkumab", "type": "Drug", "description": "Guselkumab (Tremfya) is a selective human monoclonal antibody against IL-23p19 approved for psoriasis and PsA with favorable safety and efficacy profile. As an IL-23-selective inhibitor, guselkumab blocks IL-23 without inhibiting IL-12, reducing Th17 responses while maintaining Th1 and antimicrobial immunity. Guselkumab shows rapid onset and sustained benefit in PsA and is being evaluated in other SpA subtypes.", "drugBankId": "DB11642", "class": "IL-23 inhibitor", "approvalStatus": "FDA/EMA approved for psoriasis, PsA", "source": ["DrugBank"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Guselkumab"}, {"id": "drug-tofacitinib", "label": "Tofacitinib", "type": "Drug", "description": "Tofacitinib (Xeljanz) is a small molecule JAK inhibitor approved for rheumatoid arthritis and is under investigation in PsA and axial SpA. As a JAK1/JAK3 inhibitor, tofacitinib blocks STAT signaling downstream of multiple cytokine receptors including IL-23R and IL-6R, reducing Th17 and pro-inflammatory responses. Tofacitinib offers oral dosing twice daily with potential efficacy across SpA subtypes through broad JAK-STAT inhibition.", "drugBankId": "DB08877", "class": "JAK inhibitor", "approvalStatus": "FDA/EMA approved for RA, PsA", "source": ["DrugBank"], "confidence": "medium", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Tofacitinib"}, {"id": "drug-upadacitinib", "label": "Upadacitinib", "type": "Drug", "description": "Upadacitinib (Rinvoq) is a selective JAK1 inhibitor approved for rheumatoid arthritis and is under investigation in PsA and axial SpA. As a JAK1-selective inhibitor, upadacitinib blocks STAT signaling downstream of IL-23 and other pro-inflammatory cytokines while preserving JAK2 signaling important for infections. Upadacitinib offers once-daily oral dosing with selective JAK1 targeting in SpA.", "drugBankId": "DB12610", "class": "JAK inhibitor", "approvalStatus": "FDA/EMA approved for RA, PsA", "source": ["DrugBank"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Upadacitinib"}, {"id": "drug-nsaids", "label": "NSAIDs (General)", "type": "Drug", "description": "NSAIDs (Non-steroidal Anti-inflammatory Drugs) are first-line symptomatic therapies for SpA pain and inflammation, including indomethacin, naproxen, and celecoxib. Continuous NSAID use may slow radiographic progression in early AS by inhibiting prostaglandin synthesis and inflammation. NSAIDs are recommended for all SpA patients as symptomatic management with or without DMARDs.", "class": "NSAID", "approvalStatus": "Standard therapy", "source": ["EULAR"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Nonsteroidal_anti-inflammatory_drug"}, {"id": "drug-sulfasalazine", "label": "Sulfasalazine", "type": "Drug", "description": "Sulfasalazine (Azulfidine) is a combination drug of 5-aminosalicylic acid and sulfapyridine used as a conventional DMARD in peripheral SpA and reactive arthritis. Sulfasalazine has modest efficacy in peripheral spondyloarthritis particularly when combined with NSAIDs, with anti-inflammatory and potential antimicrobial properties. Sulfasalazine requires monitoring for adverse effects and is less effective in axial disease than TNF inhibitors.", "drugBankId": "DB00633", "class": "DMARD", "approvalStatus": "Used in SpA", "source": ["DrugBank"], "confidence": "medium", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Sulfasalazine"}, {"id": "drug-physical-therapy", "label": "Physical Therapy", "type": "Drug", "description": "Physical therapy and exercise programs are essential non-pharmacological management strategies in SpA that improve spinal mobility, functional capacity, and quality of life. Regular exercise programs reduce stiffness, improve strength and cardiovascular fitness, and may slow spinal fusion progression when combined with biologic therapy. Patient education and adherence to exercise are critical for long-term outcomes.", "class": "Non-pharmacological", "approvalStatus": "Standard therapy", "source": ["EULAR"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Physical_therapy"}, {"id": "drug-bimekizumab", "label": "Bimekizumab", "type": "Drug", "description": "Bimekizumab is a monoclonal antibody against IL-17A and IL-17F (dual IL-17 inhibition) that is in late-stage clinical trials for AS and PsA. Dual IL-17A/IL-17F targeting may provide superior efficacy compared to IL-17A-selective inhibitors by blocking both IL-17 isoforms. Bimekizumab shows promise as an emerging first-line biologic for SpA.", "class": "IL-17A/F inhibitor", "approvalStatus": "FDA/EMA approved for PsA", "source": ["Literature"], "confidence": "high", "references": ["25180821"], "wikipedia": "https://en.wikipedia.org/wiki/Bimekizumab"}, {"id": "biomarker-crp", "label": "CRP", "type": "Biomarker", "description": "C-Reactive Protein (CRP) is an acute phase reactant synthesized by hepatocytes in response to IL-6 and TNF-alpha, used as a serological marker of systemic inflammation in SpA. Elevated CRP correlates with clinical disease activity, imaging progression, and prognosis in AS and other SpA subtypes, with CRP >10 mg/L indicating active inflammation. CRP levels decline with effective TNF inhibitor therapy and are used to monitor treatment response.", "biomarkerType": "Laboratory", "clinicalUse": "Monitoring disease activity", "source": ["Clinical practice"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/C-reactive_protein"}, {"id": "biomarker-esr", "label": "ESR", "type": "Biomarker", "description": "Erythrocyte Sedimentation Rate (ESR) is a non-specific marker of inflammation measured by the rate of RBC settling in plasma, elevated in active SpA. ESR correlates with systemic inflammation, disease activity, and radiographic progression in AS and other SpA subtypes, though it is less specific than CRP. ESR levels normalize with effective biologic therapy and are used alongside CRP and clinical assessment to monitor SpA disease activity.", "biomarkerType": "Laboratory", "clinicalUse": "Monitoring disease activity", "source": ["Clinical practice"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/Erythrocyte_sedimentation_rate"}, {"id": "biomarker-hla-b27-test", "label": "HLA-B27 Test", "type": "Biomarker", "description": "HLA-B27 testing is a genetic marker test that identifies the presence of HLA-B27 allele, present in 88-90% of AS patients but only 6-8% of general population. Positive HLA-B27 supports diagnosis of axial SpA and predicts more aggressive disease with earlier onset and greater spinal involvement. HLA-B27 testing is recommended for all patients with suspected SpA to support diagnosis and prognostication.", "biomarkerType": "Genetic", "clinicalUse": "Diagnosis, prognosis", "source": ["Clinical practice"], "confidence": "high", "references": ["22553110"], "wikipedia": "https://en.wikipedia.org/wiki/HLA-B27"}, {"id": "biomark
